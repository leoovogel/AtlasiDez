name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/AtlasiDez.slnx

      - name: Build
        run: dotnet build backend/AtlasiDez.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test backend/AtlasiDez.Tests/AtlasiDez.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal

  deploy-backend:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/atlasidez:latest
            ghcr.io/${{ github.repository_owner }}/atlasidez:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: atlasidez-api
          resourceGroup: atlasidez-rg
          imageToDeploy: ghcr.io/${{ github.repository_owner }}/atlasidez:${{ github.sha }}
          targetPort: 8080
          environmentVariables: >
            ASPNETCORE_ENVIRONMENT=Production
            CityProvider=Ibge
            Cache__RedisConnectionString=secretref:redis-conn
            Cors__AllowedOrigins__0=secretref:frontend-url

  deploy-frontend:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Build
        env:
          VITE_API_URL: https://atlasidez-api.proudriver-27e08694.brazilsouth.azurecontainerapps.io
        run: npm run build
        working-directory: frontend

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true
