name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/AtlasiDez.slnx

      - name: Build
        run: dotnet build backend/AtlasiDez.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test backend/AtlasiDez.Tests/AtlasiDez.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/**/coverage.cobertura.xml

      - name: Check minimum coverage (85%)
        run: |
          REPORT=$(find coverage -name "coverage.cobertura.xml" | head -1)
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$REPORT" | head -1)
          COVERAGE=$(echo "$LINE_RATE * 100" | bc -l)
          echo "Code coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the minimum threshold of 85%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets the minimum threshold of 85%"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
