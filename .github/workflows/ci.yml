name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore AtlasiDez.slnx

      - name: Build
        run: dotnet build AtlasiDez.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test AtlasiDez.Tests/AtlasiDez.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/**/coverage.cobertura.xml

      - name: Check minimum coverage (85%)
        run: |
          REPORT=$(find coverage -name "coverage.cobertura.xml" | head -1)
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$REPORT" | head -1)
          COVERAGE=$(echo "$LINE_RATE * 100" | bc -l)
          COVERAGE_INT=$(printf "%.0f" "$COVERAGE")
          echo "Code coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the minimum threshold of 85%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets the minimum threshold of 85%"
