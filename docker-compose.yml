services:
  api:
    build: ./backend
    ports:
      - "5087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Cache__RedisConnectionString=redis:6379
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
